name: Release

# Triggered by a push to master whose commit message starts with "chore(release):".
# npm version patch/minor/major creates that commit and pushes it (no tag pushed locally).
#
# Flow:
#   build (matrix, 5 jobs in parallel)
#     └── upload-artifact per platform
#   release (needs: build)
#     └── download all artifacts → extract CHANGELOG notes → gh release create

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  # ── Platform builds ────────────────────────────────────────────────────────
  build:
    if: startsWith(github.event.head_commit.message, 'chore(release):')
    strategy:
      fail-fast: false    # finish all platforms even if one fails
      matrix:
        include:
          - os: ubuntu-latest
            script: dist:linux
            artifact: linux-x64

          - os: windows-latest
            script: dist:win10
            artifact: win10-x64

          # Windows 11: separate jobs so x64 + arm64 run in parallel.
          # Each npm script calls `electron-builder install-app-deps --arch <target>`
          # first, ensuring better-sqlite3's correct prebuilt binary is bundled.
          - os: windows-latest
            script: dist:win11:x64
            artifact: win11-x64

          - os: windows-latest
            script: dist:win11:arm64
            artifact: win11-arm64

          - os: macos-latest
            script: dist:mac
            artifact: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # better-sqlite3 falls back to compiling from source when no prebuilt
      # binary matches the exact Electron ABI — Python + build tools cover that.
      - name: Set up Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update -q && sudo apt-get install -y python3 make g++

      - run: npm ci

      # Windows Defender scans PE executables after NSIS writes them and can
      # modify the binary in a way that invalidates the NSIS CRC checksum,
      # causing "Installer integrity check has failed" on end-user machines.
      # Excluding the workspace from real-time scanning prevents this.
      - name: Exclude workspace from Windows Defender scanning
        if: runner.os == 'Windows'
        run: |
          # Workspace: covers source files and the dist/ output directory.
          # TEMP: electron-builder assembles the NSIS installer in a temp dir
          # outside the workspace; excluding it prevents Defender from touching
          # the PE while makensis is still writing it, which would corrupt the
          # CRC and cause "Installer integrity check has failed" on end-user machines.
          Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE"
          Add-MpPreference -ExclusionPath "$env:TEMP"
        shell: pwsh

      # electron-builder requires icon.icns for macOS packaging.
      # Generate it from the existing icon.png with the macOS-native sips + iconutil.
      - name: Generate icon.icns (macOS)
        if: runner.os == 'macOS'
        run: |
          SRC="electron/icons/icon.png"
          SET="electron/icons/icon.iconset"
          mkdir -p "$SET"
          for S in 16 32 64 128 256 512; do
            sips -z $S $S "$SRC" --out "$SET/icon_${S}x${S}.png"    > /dev/null
          done
          sips -z  32  32 "$SRC" --out "$SET/icon_16x16@2x.png"     > /dev/null
          sips -z  64  64 "$SRC" --out "$SET/icon_32x32@2x.png"     > /dev/null
          sips -z 256 256 "$SRC" --out "$SET/icon_128x128@2x.png"   > /dev/null
          sips -z 512 512 "$SRC" --out "$SET/icon_256x256@2x.png"   > /dev/null
          iconutil -c icns "$SET" -o electron/icons/icon.icns

      - name: Build (${{ matrix.script }})
        run: npm run ${{ matrix.script }}
        env:
          EP_DRAFT: 'true'   # prevents electron-builder from auto-publishing

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    needs: build
    if: startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from package.json
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Extract CHANGELOG notes for v${{ steps.ver.outputs.version }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^---$/{exit} found" \
            CHANGELOG.md > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="v${VERSION}"
          # Explicit globs — excludes combined win11.exe (no arch suffix) that
          # electron-builder generates when both x64 + arm64 targets are defined.
          gh release create "$TAG" \
            artifacts/*win10*.exe \
            artifacts/*win11*x64*.exe \
            artifacts/*win11*arm64*.exe \
            artifacts/*.dmg \
            artifacts/*.AppImage \
            artifacts/*.deb \
            --title "ArchivVerwalter ${TAG}" \
            --notes-file release-notes.md
