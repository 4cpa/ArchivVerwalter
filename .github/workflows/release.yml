name: Build & Release

# Runs whenever a version tag (v1.2.3) is pushed.
# Builds native installers on each platform's own runner and
# attaches them to the GitHub Release that is created automatically.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create/update releases and upload assets

jobs:
  build:
    strategy:
      fail-fast: false    # keep building the other platforms even if one fails
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            script: dist:linux
            artifact_glob: "dist/*.AppImage dist/*.deb"

          # Windows 10 -- x64 only (Intel/AMD, 64-bit)
          - os: windows-latest
            platform: win
            script: dist:win10
            artifact_glob: "dist/*win10*.exe"

          # Windows 11 x64
          - os: windows-latest
            platform: win
            script: dist:win11:x64
            artifact_glob: "dist/*win11*x64*.exe"

          # Windows 11 arm64 (Surface Pro X, Copilot+ PCs)
          # install-app-deps is called with --arch arm64 so better-sqlite3's
          # prebuilt arm64 binary is downloaded before packaging — otherwise the
          # x64 host binary would be bundled and crash on startup on ARM hardware.
          - os: windows-latest
            platform: win
            script: dist:win11:arm64
            artifact_glob: "dist/*win11*arm64*.exe"

          - os: macos-latest
            platform: mac
            script: dist:mac
            artifact_glob: "dist/*.dmg"

    runs-on: ${{ matrix.os }}

    steps:
      # -- Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # -- Node.js
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # -- Python (needed to compile sqlite3 native module)
      - name: Set up Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # -- Linux build deps
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3 make g++

      # -- Install npm packages
      - name: Install dependencies
        run: npm ci

      # -- Generate .icns icon (macOS only)
      # electron-builder requires a .icns file for macOS builds.
      # We generate it from the existing 512x512 icon.png using built-in tools.
      - name: Generate icon.icns (macOS)
        if: runner.os == 'macOS'
        run: |
          SOURCE="electron/icons/icon.png"
          ICONSET="electron/icons/icon.iconset"
          mkdir -p "$ICONSET"
          for SIZE in 16 32 64 128 256 512; do
            sips -z $SIZE $SIZE "$SOURCE" \
              --out "$ICONSET/icon_${SIZE}x${SIZE}.png" > /dev/null
          done
          # @2x variants (double resolution)
          sips -z 32  32  "$SOURCE" --out "$ICONSET/icon_16x16@2x.png"  > /dev/null
          sips -z 64  64  "$SOURCE" --out "$ICONSET/icon_32x32@2x.png"  > /dev/null
          sips -z 256 256 "$SOURCE" --out "$ICONSET/icon_128x128@2x.png" > /dev/null
          sips -z 512 512 "$SOURCE" --out "$ICONSET/icon_256x256@2x.png" > /dev/null
          iconutil -c icns "$ICONSET" -o electron/icons/icon.icns

      # -- Build installer
      # Each matrix entry specifies its own npm script.
      # Windows: dist:win10 (x64) or dist:win11 (x64 + arm64)
      - name: Build installer (${{ matrix.script }})
        run: npm run ${{ matrix.script }}
        env:
          # Prevents electron-builder from trying to auto-publish
          EP_DRAFT: true

      # -- List build output (debug)
      - name: List dist/ directory
        shell: bash
        run: ls -lh dist/ 2>/dev/null || echo "(dist/ is empty)"

      # -- Upload artifacts to GitHub Release
      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          # Create the release as a draft so you can review before publishing
          draft: true
          generate_release_notes: true
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
